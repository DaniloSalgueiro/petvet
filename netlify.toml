[build]
  command = "npm install && npx vite build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"

[[redirects]]
  from = "/app-icon"
  to = "/.netlify/functions/app-icon"
  status = 200

[[redirects]]
  from = "/manifest.json"
  to = "/.netlify/functions/manifest"
  status = 200

# SPA fallback — todas as rotas para index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
